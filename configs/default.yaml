env:
  max_steps: 300
  agv_count: 2
  agv_speed: 0.2
  pickup_radius: 0.5
  drop_radius: 0.5
  render_pause_s: 0.001
  boundary_margin: 0.0
  pickup_index_count: 1
  pick_sort_key: fifo
  obs:
    station_radius: 0.5
    include_current_station: false
    pick_window_k: 0
    include_machine_timer: false
    include_machine_timer: false
  station_positions:
    SRC: [1.0, 1.0]
    TURNING: [4.0, 4.0]
    GRINDING: [7.0, 4.0]
    MILLING: [10.0, 4.0]
    DRILLING: [13.0, 4.0]
    SINK: [13.0, 1.0]
  bounds:
    xmin: 0.0
    ymin: 0.0
    xmax: 15.0
    ymax: 15.0
  process_time_defaults:
    Turning: 30
    Grinding: 20
    Milling: 40
    Drilling: 10

reward:
  task_complete: 50.0
  time_penalty: -0.1
  time_penalty_mode: per_agent
  out_of_bounds_penalty: -5.0
  wrong_drop_penalty: -1.0
  late_penalty_per_step: -0.2
  boundary_shaping_weight: 0.0

jobs:
  P1:
    part: Shaft
    material: Bar
    route: [Turning, Grinding]
  P2:
    part: Flange
    material: Cube
    route: [Turning, Milling, Drilling]
  P3:
    part: Plate
    material: Plate
    route: [Milling]
  P4:
    part: Frame
    material: Bar
    route: [Milling, Drilling]

orders:
  - id: 1
    job_type: P1
    arrival: 15
    due: 160
    process_times: [35, 12]
  - id: 2
    job_type: P2
    arrival: 50
    due: 180
    process_times: [32, 10, 20]
  - id: 3
    job_type: P3
    arrival: 75
    due: 210
    process_times: [43]
  - id: 4
    job_type: P4
    arrival: 100
    due: 230
    process_times: [38, 10]
  - id: 5
    job_type: P1
    arrival: 130
    due: 260
    process_times: [47, 15]

training:
  total_timesteps: 40000
  n_steps: 2048
  batch_size: 64
  learning_rate: 3e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  update_epochs: 4
  ent_coef: 0.01
  vf_coef: 1.0
  max_grad_norm: 0.5
  save_freq: 5000
