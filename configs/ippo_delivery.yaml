env:
  max_steps: 800
  agv_count: 2
  agv_speed: 0.8
  pickup_radius: 1.0
  drop_radius: 1.0
  # Delivery requires an explicit DROP action at SINK (no auto-deliver shortcut).
  auto_deliver_at_sink: false
  # Training aid: once an AGV reaches SINK while carrying a finished order, force DROP.
  force_drop_at_sink: true
  # Training aid: if an empty AGV is at a station with an unclaimed finished handoff, force PICK.
  force_pick_finished_handoff: true
  # Training aid: keep the WIP pipeline moving (force PICK at stations, force DROP when valid).
  force_pick_at_station: true
  force_drop_when_valid: true
  render_pause_s: 0.001
  boundary_margin: 0.0
  collision_radius: 0.0
  arrival_shift_to_first: true
  machine_as_agent: true
  machine_action_k: 5
  machine_obs_k: 5
  machine_sort_key: buffer
  eligible_buffer_capacity: 5
  pickup_index_count: 5
  pick_sort_key: buffer
  obs:
    station_radius: 1.0
    include_current_station: true
    pick_window_k: 5
    include_machine_timer: false
    include_station_positions: true
    station_pos_mode: relative
    station_pos_normalize: true
    include_neighbor_agvs: false
    neighbor_k: 1
    neighbor_normalize: true
    include_target_vector: true
    target_normalize: true
    # Handoff alert board for AGVs: shows where finished orders are waiting and how long they've waited.
    include_handoff_alert: true
    handoff_include_age: true
  station_positions:
    SRC: [1.0, 1.0]
    TURNING: [4.0, 4.0]
    GRINDING: [7.0, 4.0]
    MILLING: [10.0, 4.0]
    DRILLING: [13.0, 4.0]
    SINK: [13.0, 1.0]
  bounds:
    xmin: 0.0
    ymin: 0.0
    xmax: 15.0
    ymax: 15.0
  process_time_defaults:
    Turning: 30
    Grinding: 20
    Milling: 40
    Drilling: 10

reward:
  # Key change vs default.yaml:
  # - Make delivery reward *local* to the delivering AGV (easier credit assignment).
  global_task_complete: false
  task_complete: 250.0

  time_penalty: -0.02
  # Less aggressive: penalize time once per step for the whole team.
  time_penalty_mode: shared

  out_of_bounds_penalty: -5.0
  wrong_drop_penalty: -1.0
  pick_failed_penalty: -0.2
  drop_failed_penalty: -0.2
  # Reduce "intermediate" rewards to avoid local optima (keep moving parts around forever).
  pick_reward: 0.5
  # Strong "alert-like" signal: when an AGV picks a finished order, reward it heavily.
  pick_finished_reward: 30.0
  # Extra reward for claiming a finished handoff request (first pick of an unclaimed finished order).
  handoff_claimed_reward: 20.0
  correct_drop_reward: 1.0

  # Keep machine rewards small; delivery should dominate.
  machine_start_reward: 0.2
  machine_complete_reward: 0.2
  # Give strong credit for completing each processing stage (dense progress signal).
  machine_order_advance_reward: 2.0
  machine_order_finish_reward: 20.0
  # Discourage invalid/idle selections when there are eligible orders.
  machine_select_failed_penalty: -0.2

  # Small team progress signal so AGVs don't feel "nothing is happening" early on.
  global_machine_order_finish_reward: 0.2

  # Encourage actually bringing finished parts to SINK.
  # Waiting finished orders should hurt more than carrying them (carrying implies progress).
  finished_wait_penalty_per_step: -0.6
  finished_carried_penalty_per_step: -0.05
  finished_penalty_mode: agv

  late_penalty_per_step: -0.2
  early_bonus_per_step: 0.05
  on_time_bonus: 2.0

  collision_penalty: -2.0
  global_collision_penalty: 0.0

  distance_shaping_mode: signed
  distance_reward_weight: 2.0
  boundary_shaping_weight: 0.0

jobs:
  P1:
    part: Shaft
    material: Bar
    route: [Turning, Grinding]
  P2:
    part: Flange
    material: Cube
    route: [Turning, Milling, Drilling]
  P3:
    part: Plate
    material: Plate
    route: [Milling]
  P4:
    part: Frame
    material: Bar
    route: [Milling, Drilling]

orders:
  - id: 1
    job_type: P1
    arrival: 15
    due: 160
    process_times: [35, 12]
  - id: 2
    job_type: P2
    arrival: 50
    due: 180
    process_times: [32, 10, 20]
  - id: 3
    job_type: P3
    arrival: 75
    due: 210
    process_times: [43]
  - id: 4
    job_type: P4
    arrival: 100
    due: 230
    process_times: [38, 10]
  - id: 5
    job_type: P1
    arrival: 130
    due: 260
    process_times: [47, 15]

training:
  total_timesteps: 80000
  n_steps: 2048
  batch_size: 64
  learning_rate: 3e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  update_epochs: 4
  ent_coef: 0.01
  exploration_eps: 0.15
  vf_coef: 1.0
  max_grad_norm: 0.5
  save_freq: 5000
  print_order_matrix: true
